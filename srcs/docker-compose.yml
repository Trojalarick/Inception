version: "3.9"

services:

  mariadb:
    build:
      context: ./requirements/mariadb
    container_name: mariadb
    image: mariadb:inception
    restart: always
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception

  wordpress:
    build:
      context: ./requirements/wordpress
    container_name: wordpress
    image: wordpress:inception
    restart: always
    depends_on:
      - mariadb
    env_file:
      - .env
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception

  nginx:
    build:
      context: ./requirements/nginx
    container_name: nginx
    image: nginx:inception
    restart: always
    depends_on:
      - wordpress
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception

  redis:
    build:
      context: ./requirements/bonus/redis
    container_name: redis
    image: redis:inception
    restart: always
    networks:
      - inception

  ftp:
    build:
      context: ./requirements/bonus/ftp
    container_name: ftp
    image: ftp:inception
    restart: always
    ports:
      - "21:21"
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception

  adminer:
    build:
      context: ./requirements/bonus/adminer
    container_name: adminer
    image: adminer:inception
    restart: always
    networks:
      - inception

volumes:
  mariadb_data:
    driver: local
  wordpress_data:
    driver: local

networks:
  inception:
    driver: bridge
